workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      node: 22
      java: 17
    scripts:
      - name: Instalar dependencias
        script: |
          npm install
      - name: Sincronizar Capacitor
        script: |
          npx cap sync android
      - name: Compilar APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk