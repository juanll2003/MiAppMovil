<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:Arial,sans-serif; background:#f5f5f5; }
    #offline {
      display:none;
      justify-content:center;
      align-items:center;
      height:100vh;
      text-align:center;
      padding:20px;
    }
    #offline.visible { display:flex; }
    .card {
      background:white;
      border-radius:16px;
      padding:40px 30px;
      box-shadow:0 4px 20px rgba(0,0,0,0.1);
      max-width:320px;
      width:100%;
    }
    .icono { font-size:64px; margin-bottom:20px; }
    h1 { font-size:22px; color:#333; margin-bottom:10px; }
    p { font-size:15px; color:#666; margin-bottom:30px; line-height:1.5; }
    button {
      background:#1a73e8;
      color:white;
      border:none;
      padding:14px 32px;
      border-radius:8px;
      font-size:16px;
      cursor:pointer;
      width:100%;
    }

    /* Iframe ocupa toda la pantalla */
    #appFrame {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      border:none;
    }
    #appFrame.visible { display:block; }
  </style>
</head>
<body>

  <!-- La app se carga acá adentro, no en el navegador -->
  <iframe id="appFrame" src=""></iframe>

  <!-- Pantalla sin conexión -->
  <div id="offline">
    <div class="card">
      <div class="icono">📡</div>
      <h1>Sin conexión</h1>
      <p>Revisá tu conexión a internet e intentá de nuevo.</p>
      <button onclick="reintentar()">🔄 Reintentar</button>
    </div>
  </div>

  <script>
    const APP_URL = 'https://tudominio.com'; // ← tu URL real acá

    function mostrarApp() {
      document.getElementById('offline').classList.remove('visible');
      var frame = document.getElementById('appFrame');
      frame.classList.add('visible');
      if (frame.src !== APP_URL) {
        frame.src = APP_URL;
      }
    }

    function mostrarOffline() {
      document.getElementById('appFrame').classList.remove('visible');
      document.getElementById('offline').classList.add('visible');
    }

    function reintentar() {
      if (navigator.onLine) {
        mostrarApp();
      } else {
        mostrarOffline();
      }
    }

    // Al abrir la app
    if (navigator.onLine) {
      mostrarApp();
    } else {
      mostrarOffline();
    }

    window.addEventListener('offline', mostrarOffline);
    window.addEventListener('online', mostrarApp);
  </script>

</body>
</html>
